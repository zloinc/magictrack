<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>✨ Magic Hands</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #ui {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 7px 17px; border: 1px solid rgba(255,255,255,0.18); border-radius: 30px;
      background: rgba(255,255,255,0.05); color: #999; cursor: pointer;
      font-size: 12px; backdrop-filter: blur(8px); transition: all .2s; user-select: none;
    }
    .btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .btn.active {
      background: rgba(120,60,255,0.48); border-color: #a06aff;
      color: #fff; box-shadow: 0 0 16px rgba(150,80,255,0.55);
    }
    #status {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 1px;
      z-index: 10; pointer-events: none;
    }
    video { display: none; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    #video-canvas { z-index: 0; }
    #fx-canvas    { z-index: 1; }
  </style>
</head>
<body>

<canvas id="video-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<video id="video" playsinline></video>

<div id="ui">
  <div class="btn active" data-fx="web">🕸 Web</div>
  <div class="btn" data-fx="warp">🌀 Warp</div>
  <div class="btn" data-fx="lightning">⚡ Lightning</div>
  <div class="btn" data-fx="particles">✨ Particles</div>
  <div class="btn" data-fx="aura">🛡 Aura</div>
  <div class="btn" data-fx="rigging">🦴 Rigging</div>
  <div class="btn" data-fx="fireworks">🎆 Fireworks</div>
  <div class="btn" data-fx="nova">💥 Nova</div>
  <div class="btn" data-fx="portal">🌀 Portal</div>
  <div class="btn" data-fx="orbs">🔮 Orbs</div>
</div>
<div id="status">Loading model…</div>

<script>
// ── Canvases ──────────────────────────────────────────────────────────────────
const vidCanvas = document.getElementById('video-canvas');
const vidCtx    = vidCanvas.getContext('2d');
const fxCanvas  = document.getElementById('fx-canvas');
const ctx       = fxCanvas.getContext('2d');
const video     = document.getElementById('video');
const statusEl  = document.getElementById('status');
let W = 0, H = 0;
function resize() {
  W = vidCanvas.width = fxCanvas.width  = window.innerWidth;
  H = vidCanvas.height = fxCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resize); resize();

// ── Effect radio ──────────────────────────────────────────────────────────────
let activeFx = 'web';
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFx = btn.dataset.fx;
    particles.length = 0;
    novaBursts.length = 0;
    for (const k in orbs)   delete orbs[k];
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
const rand   = (a, b) => Math.random() * (b - a) + a;
const dist2d = (a, b)  => Math.hypot(a.x - b.x, a.y - b.y);
const lerp   = (a, b, t) => a + (b - a) * t;
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
// Mirror x for selfie view
const lm2s   = lm => ({ x: (1 - lm.x) * W, y: lm.y * H });

const TIPS = [4, 8, 12, 16, 20];
const FINGER_CHAINS = {
  4: [1,2,3,4],
  8: [5,6,7,8],
  12: [9,10,11,12],
  16: [13,14,15,16],
  20: [17,18,19,20],
};
const HAND_HUE = [200, 300];
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

function rawDist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
}

function getOpenFingerIndices(rawLms) {
  const open = [];
  const thumbOpen =
    rawDist(rawLms[4], rawLms[0]) > rawDist(rawLms[3], rawLms[0]) * 1.12 &&
    rawDist(rawLms[4], rawLms[5]) > rawDist(rawLms[3], rawLms[5]) * 1.05;
  if (thumbOpen) open.push(4);

  [[8,6,5], [12,10,9], [16,14,13], [20,18,17]].forEach(([tip, pip, mcp]) => {
    if (rawLms[tip].y < rawLms[pip].y - 0.015 && rawLms[pip].y < rawLms[mcp].y) open.push(tip);
  });
  return open;
}

function buildHandState(rawLms, pts, hi) {
  const activeTipIndices = getOpenFingerIndices(rawLms);
  const activeFingers = activeTipIndices.map(idx => ({
    idx,
    fi: TIPS.indexOf(idx),
    p: pts[idx],
  }));
  return {
    hi,
    pts,
    activeTipIndices,
    activeFingers,
    fingerCount: activeFingers.length,
  };
}

// ── Velocity tracking ─────────────────────────────────────────────────────────
const prevLm   = {};
const velLm    = {};
let   handPosFlat = [];

function updateVelocity(allPts) {
  handPosFlat = [];
  allPts.forEach((pts, hi) => {
    pts.forEach((p, li) => {
      const key = `${hi}_${li}`;
      if (prevLm[key]) {
        const vx = p.x - prevLm[key].x, vy = p.y - prevLm[key].y;
        velLm[key] = { vx, vy, speed: Math.hypot(vx, vy) };
      } else {
        velLm[key] = { vx: 0, vy: 0, speed: 0 };
      }
      prevLm[key] = { x: p.x, y: p.y };
      handPosFlat.push({ x: p.x, y: p.y, ...velLm[key] });
    });
  });
}
function tipVel(hi, fi) { return velLm[`${hi}_${TIPS[fi]}`] || { vx:0, vy:0, speed:0 }; }

// ── Particles ─────────────────────────────────────────────────────────────────
const particles = [];
const MAX_PART  = 720;

class Particle {
  constructor(x, y, hue, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx + rand(-2, 2); this.vy = vy + rand(-3, 1);
    this.life  = 1; this.decay = rand(0.008, 0.022);
    this.r     = rand(3, 18); this.hue = hue + rand(-30, 30);
    this.grav  = rand(0.03, 0.12);
  }
  update() {
    this.vy += this.grav; this.vx *= 0.97; this.vy *= 0.97;
    this.x  += this.vx;  this.y  += this.vy;
    this.life -= this.decay;
    for (const h of handPosFlat) {
      const dx = this.x - h.x, dy = this.y - h.y, d = Math.hypot(dx, dy);
      if (d < 90 && d > 0.5) {
        const f = ((90 - d) / 90) * 1.4;
        this.vx += (dx / d) * f + h.vx * 0.25;
        this.vy += (dy / d) * f + h.vy * 0.25;
      }
    }
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save(); ctx.globalAlpha = clamp(this.life, 0, 1);
    const r = this.r * (0.4 + 0.6 * this.life);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2);
    g.addColorStop(0,   `hsla(${this.hue},100%,92%,1)`);
    g.addColorStop(0.5, `hsla(${this.hue},100%,70%,0.6)`);
    g.addColorStop(1,   `hsla(${this.hue},100%,50%,0)`);
    ctx.fillStyle = g; ctx.beginPath();
    ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
}
function spawnAt(x, y, hue, n = 4, vx = 0, vy = 0) {
  for (let i = 0; i < n && particles.length < MAX_PART; i++)
    particles.push(new Particle(x, y, hue, vx * 0.4, vy * 0.4));
}

const novaBursts = [];
const novaCooldown = {};

class NovaBurst {
  constructor(x, y, hue, power = 1) {
    this.x = x; this.y = y; this.hue = hue;
    this.life = 1;
    this.power = power;
    this.r = 24;
    this.maxR = 120 + power * 120;
    this.spokes = Array.from({ length: 10 }, (_, i) => ({
      angle: (i / 10) * Math.PI * 2 + rand(-0.2, 0.2),
      len: rand(18, 48) * (0.8 + power * 0.45),
      width: rand(1.5, 4),
      hue: hue + rand(-35, 35),
    }));
  }
  update() {
    this.r = lerp(this.r, this.maxR, 0.12);
    this.life -= 0.035;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = this.life;
    const halo = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 1.8);
    halo.addColorStop(0, `hsla(${this.hue},100%,88%,0.45)`);
    halo.addColorStop(0.45, `hsla(${this.hue + 35},100%,68%,0.18)`);
    halo.addColorStop(1, `hsla(${this.hue + 85},100%,55%,0)`);
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 1.8, 0, Math.PI * 2);
    ctx.fill();
    this.spokes.forEach(spoke => {
      const ex = this.x + Math.cos(spoke.angle) * (this.r + spoke.len);
      const ey = this.y + Math.sin(spoke.angle) * (this.r + spoke.len);
      ctx.strokeStyle = `hsla(${spoke.hue},100%,78%,${this.life * 0.7})`;
      ctx.lineWidth = spoke.width * this.life;
      ctx.shadowBlur = 14;
      ctx.shadowColor = `hsla(${spoke.hue},100%,72%,0.8)`;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    });
    ctx.restore();
  }
}

// ── Orbs ──────────────────────────────────────────────────────────────────────
const orbs = {};
function getOrb(key, tx, ty, hue) {
  if (!orbs[key]) orbs[key] = { x: tx, y: ty, tx, ty, hue, angle: 0 };
  orbs[key].tx = tx; orbs[key].ty = ty; orbs[key].hue = hue;
  return orbs[key];
}

// ── Glow dot ──────────────────────────────────────────────────────────────────
function drawDot(x, y, hue, r = 13) {
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);
  ctx.save(); ctx.shadowBlur = 22; ctx.shadowColor = `hsla(${hue},100%,70%,1)`;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * pulse);
  g.addColorStop(0, `hsla(${hue},100%,96%,1)`);
  g.addColorStop(1, `hsla(${hue},100%,60%,0)`);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * pulse, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}

function drawRigJoint(x, y, size, hue, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = `hsla(${hue},18%,18%,0.95)`;
  ctx.strokeStyle = `hsla(${hue},100%,78%,0.95)`;
  ctx.lineWidth = 1.2;
  ctx.shadowBlur = 8;
  ctx.shadowColor = `hsla(${hue},100%,72%,0.55)`;
  ctx.beginPath();
  ctx.roundRect(x - size, y - size, size * 2, size * 2, 3);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawRigBone(a, b, hue, width = 8, alpha = 1) {
  const angle = Math.atan2(b.y - a.y, b.x - a.x);
  const len = dist2d(a, b);
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(22,24,28,0.86)';
  ctx.strokeStyle = `hsla(${hue},100%,76%,0.8)`;
  ctx.lineWidth = 1.1;
  ctx.shadowBlur = 10;
  ctx.shadowColor = `hsla(${hue},100%,68%,0.28)`;
  ctx.beginPath();
  ctx.roundRect(0, -width * 0.5, len, width, width * 0.45);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawRigAxis(a, b, hue, scale = 1) {
  const angle = Math.atan2(b.y - a.y, b.x - a.x);
  const axisLen = 14 * scale;
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(angle);
  ctx.globalAlpha = 0.8;
  ctx.lineWidth = 1.25;
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,90,90,0.9)';
  ctx.moveTo(0, 0);
  ctx.lineTo(axisLen, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(90,255,120,0.9)';
  ctx.moveTo(0, 0);
  ctx.lineTo(0, axisLen * 0.75);
  ctx.stroke();
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(90,160,255,0.9)';
  ctx.moveTo(0, 0);
  ctx.lineTo(-axisLen * 0.55, axisLen * 0.42);
  ctx.stroke();
  ctx.restore();
}

function drawRigLabel(x, y, text, hue, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = '10px Menlo, Monaco, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const padX = 6, padY = 3;
  const w = ctx.measureText(text).width + padX * 2;
  ctx.fillStyle = 'rgba(10,12,18,0.88)';
  ctx.strokeStyle = `hsla(${hue},100%,76%,0.8)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y - 8, w, 16, 4);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = `hsla(${hue},100%,88%,0.95)`;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawRigParentLine(a, b, hue, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = `hsla(${hue},100%,78%,0.65)`;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.restore();
}

// ── Capsule clip ──────────────────────────────────────────────────────────────
function capsulePath(x1, y1, x2, y2, thick) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const px = -Math.sin(angle) * thick, py = Math.cos(angle) * thick;
  ctx.beginPath();
  ctx.moveTo(x1 + px, y1 + py); ctx.lineTo(x2 + px, y2 + py);
  ctx.arc(x2, y2, thick, angle - Math.PI / 2, angle + Math.PI / 2);
  ctx.lineTo(x1 - px, y1 - py);
  ctx.arc(x1, y1, thick, angle + Math.PI / 2, angle - Math.PI / 2);
  ctx.closePath();
}

// ════════ EFFECTS ════════════════════════════════════════════════════════════

// 🕸 WEB
function drawWeb(handStates) {
  handStates.forEach(state => {
    const { hi, pts, activeFingers, activeTipIndices } = state;
    const hue = HAND_HUE[hi % 2];
    activeTipIndices.forEach(idx => {
      const chain = FINGER_CHAINS[idx];
      for (let i = 0; i < chain.length; i++) {
        const a = i === 0 ? 0 : chain[i - 1];
        const b = chain[i];
        ctx.save(); ctx.strokeStyle = `hsla(${hue},80%,60%,0.42)`;
        ctx.lineWidth = 1.5; ctx.shadowBlur = 6; ctx.shadowColor = `hsla(${hue},100%,60%,0.42)`;
        ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke(); ctx.restore();
      }
    });
    for (let a = 0; a < activeFingers.length; a++) for (let b = a + 1; b < activeFingers.length; b++) {
      const d = dist2d(activeFingers[a].p, activeFingers[b].p), alpha = Math.max(0, 1 - d / 340);
      if (alpha < 0.02) continue;
      const grad = ctx.createLinearGradient(activeFingers[a].p.x, activeFingers[a].p.y, activeFingers[b].p.x, activeFingers[b].p.y);
      grad.addColorStop(0, `hsla(${hue + a * 12},100%,70%,1)`);
      grad.addColorStop(1, `hsla(${hue + b * 12},100%,70%,1)`);
      ctx.save(); ctx.globalAlpha = alpha * 0.85; ctx.strokeStyle = grad;
      ctx.lineWidth = 3 * alpha; ctx.shadowBlur = 14; ctx.shadowColor = `hsla(${hue},100%,65%,0.7)`;
      ctx.beginPath(); ctx.moveTo(activeFingers[a].p.x, activeFingers[a].p.y); ctx.lineTo(activeFingers[b].p.x, activeFingers[b].p.y); ctx.stroke(); ctx.restore();
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
}

// 🌀 WARP
function drawWarpLine(x1, y1, x2, y2, hue) {
  const d = Math.hypot(x2 - x1, y2 - y1);
  if (d < 24 || d > 420) return;

  const t = Date.now() / 1000;
  const mix = clamp(1 - (d - 40) / 340, 0, 1);
  const thick = 22 + mix * 30;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const perpX = -Math.sin(angle), perpY = Math.cos(angle);
  const midX = (x1 + x2) * 0.5;
  const midY = (y1 + y2) * 0.5;
  const wobble = Math.sin(t * 2.7 + hue * 0.03 + d * 0.008) * thick * 0.38;
  const sag = thick * (0.42 + mix * 0.92);
  const cx = midX + perpX * wobble;
  const cy = midY + perpY * wobble + sag;
  const blobBulge = thick * (0.75 + mix * 0.45);

  const startHue = (hue - 35 + 360) % 360;
  const midHue = (hue + 28) % 360;
  const endHue = (hue + 95) % 360;
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0, `hsla(${startHue},100%,70%,${0.28 + mix * 0.18})`);
  g.addColorStop(0.5, `hsla(${midHue},100%,78%,${0.36 + mix * 0.22})`);
  g.addColorStop(1, `hsla(${endHue},100%,70%,${0.28 + mix * 0.18})`);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.beginPath();
  ctx.moveTo(x1 + perpX * thick * 0.86, y1 + perpY * thick * 0.86);
  ctx.quadraticCurveTo(cx + perpX * blobBulge, cy + perpY * blobBulge, x2 + perpX * thick * 0.86, y2 + perpY * thick * 0.86);
  ctx.arc(x2, y2, thick, angle - Math.PI / 2, angle + Math.PI / 2);
  ctx.quadraticCurveTo(cx - perpX * blobBulge, cy - perpY * blobBulge, x1 - perpX * thick * 0.86, y1 - perpY * thick * 0.86);
  ctx.arc(x1, y1, thick, angle + Math.PI / 2, angle - Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.shadowBlur = 32 + mix * 30;
  ctx.shadowColor = `hsla(${midHue},100%,68%,0.72)`;
  ctx.fill();

  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, thick * 2.4);
  core.addColorStop(0, `hsla(${midHue},100%,92%,${0.22 + mix * 0.16})`);
  core.addColorStop(0.45, `hsla(${midHue + 18},100%,82%,0.18)`);
  core.addColorStop(1, `hsla(${endHue},100%,60%,0)`);
  ctx.beginPath();
  ctx.ellipse(cx, cy, thick * 1.18, thick * 0.88, angle, 0, Math.PI * 2);
  ctx.closePath();
  ctx.fillStyle = core;
  ctx.fill();

  const slime = ctx.createLinearGradient(x1, y1, x2, y2);
  slime.addColorStop(0, `hsla(${startHue + 10},100%,94%,0.12)`);
  slime.addColorStop(0.5, `hsla(${midHue},100%,98%,${0.14 + mix * 0.12})`);
  slime.addColorStop(1, `hsla(${endHue - 10},100%,94%,0.12)`);
  ctx.strokeStyle = `hsla(${midHue},100%,88%,${0.2 + mix * 0.2})`;
  ctx.lineWidth = 1.6 + mix * 2.2;
  ctx.shadowBlur = 14;
  ctx.shadowColor = `hsla(${endHue},100%,82%,0.7)`;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cx, cy, x2, y2);
  ctx.stroke();
  ctx.strokeStyle = slime;
  ctx.lineWidth = 3.4 + mix * 2.4;
  ctx.globalAlpha = 0.24 + mix * 0.12;
  ctx.beginPath();
  ctx.moveTo(x1 + perpX * thick * 0.08, y1 + perpY * thick * 0.08);
  ctx.quadraticCurveTo(cx, cy + blobBulge * 0.12, x2 - perpX * thick * 0.08, y2 - perpY * thick * 0.08);
  ctx.stroke();

  for (let s = 0; s < 2; s++) {
    const dripHue = (midHue + s * 26) % 360;
    const dripPhase = t * 2.6 + s * 1.4 + hue * 0.02;
    const dripLen = thick * (0.55 + Math.sin(dripPhase) * 0.18 + mix * 0.22);
    const dripEndX = cx + perpX * (s === 0 ? thick * 0.1 : -thick * 0.08);
    const dripEndY = cy + dripLen;
    ctx.beginPath();
    ctx.strokeStyle = `hsla(${dripHue},100%,78%,${0.16 + mix * 0.08})`;
    ctx.lineWidth = 1.8 - s * 0.35;
    ctx.moveTo(cx + perpX * (s === 0 ? thick * 0.16 : -thick * 0.12), cy + perpY * 0.08);
    ctx.quadraticCurveTo(cx + perpX * (s === 0 ? thick * 0.34 : -thick * 0.28), cy + dripLen * 0.6, dripEndX, dripEndY);
    ctx.stroke();
    if (mix > 0.45 && Math.random() < 0.015) spawnAt(dripEndX, dripEndY, dripHue, 1, rand(-0.8, 0.8), rand(0.8, 1.6));
  }
  ctx.restore();
}
function drawWarp(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    for (let a = 0; a < activeFingers.length; a++) for (let b = a + 1; b < activeFingers.length; b++) {
      const d = dist2d(activeFingers[a].p, activeFingers[b].p);
      if (d < 320) drawWarpLine(activeFingers[a].p.x, activeFingers[a].p.y, activeFingers[b].p.x, activeFingers[b].p.y, hue + a * 32 + b * 18);
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
  if (handStates.length >= 2) {
    const active0 = handStates[0].activeFingers, active1 = handStates[1].activeFingers;
    for (let a = 0; a < active0.length; a++) for (let b = 0; b < active1.length; b++) {
      const d = dist2d(active0[a].p, active1[b].p);
      if (d < 420) drawWarpLine(active0[a].p.x, active0[a].p.y, active1[b].p.x, active1[b].p.y, 250 + a * 18 + b * 26);
    }
  }
}

// ⚡ LIGHTNING
const boltCache = {};
function buildBolt(x1, y1, x2, y2, depth, spread) {
  if (depth === 0) return [[x1, y1, x2, y2]];
  const mx = (x1+x2)/2 + rand(-spread,spread), my = (y1+y2)/2 + rand(-spread,spread);
  return [...buildBolt(x1,y1,mx,my,depth-1,spread*.6), ...buildBolt(mx,my,x2,y2,depth-1,spread*.6)];
}
function getBolt(key, x1, y1, x2, y2, spread) {
  if (!boltCache[key] || --boltCache[key].ttl <= 0)
    boltCache[key] = { segs: buildBolt(x1,y1,x2,y2,4,spread), ttl: 6 };
  return boltCache[key].segs;
}
function drawLightningLine(x1, y1, x2, y2, hue, key) {
  const d = dist2d({x:x1,y:y1},{x:x2,y:y2}), segs = getBolt(key,x1,y1,x2,y2,d*.14);
  [
    { lw: 12, alpha: 0.08, light: 50, blur: 34 },
    { lw: 7, alpha: 0.16, light: 58, blur: 26 },
    { lw: 3.6, alpha: 0.48, light: 74, blur: 16 },
    { lw: 1.8, alpha: 1, light: 96, blur: 10 },
  ].forEach(pass => {
    ctx.save();
    ctx.globalAlpha = pass.alpha;
    ctx.strokeStyle = `hsla(${hue},100%,${pass.light}%,1)`;
    ctx.lineWidth = pass.lw;
    ctx.shadowBlur = pass.blur;
    ctx.shadowColor = `hsla(${hue},100%,72%,1)`;
    ctx.beginPath();
    for (const [ax,ay,bx,by] of segs) { ctx.moveTo(ax,ay); ctx.lineTo(bx,by); }
    ctx.stroke();
    ctx.restore();
  });
}
function drawLightningFx(handStates) {
  handStates.forEach(state => {
    const { hi, pts, activeFingers, activeTipIndices } = state;
    const hue = HAND_HUE[hi%2];

    const chainNodes = [];
    const seen = new Set();
    activeTipIndices.forEach(tipIdx => {
      const chain = FINGER_CHAINS[tipIdx];
      for (let i = 0; i < chain.length; i++) {
        const idx = chain[i];
        if (seen.has(idx)) continue;
        seen.add(idx);
        chainNodes.push({ idx, p: pts[idx] });
      }
      for (let i = 1; i < chain.length; i++) {
        const a = pts[chain[i - 1]], b = pts[chain[i]];
        drawLightningLine(a.x, a.y, b.x, b.y, hue + i * 8, `bone_${hi}_${chain[i - 1]}_${chain[i]}`);
      }
    });

    for (let a = 0; a < chainNodes.length; a++) for (let b = a + 1; b < chainNodes.length; b++) {
      const d = dist2d(chainNodes[a].p, chainNodes[b].p);
      if (d > 110) continue;
      if (Math.abs(chainNodes[a].idx - chainNodes[b].idx) > 5 && d > 70) continue;
      drawLightningLine(chainNodes[a].p.x, chainNodes[a].p.y, chainNodes[b].p.x, chainNodes[b].p.y, hue + a * 6 + b * 5, `mesh_${hi}_${chainNodes[a].idx}_${chainNodes[b].idx}`);
    }

    for (let a = 0; a < activeFingers.length; a++) for (let b = a+1; b < activeFingers.length; b++) {
      if (dist2d(activeFingers[a].p, activeFingers[b].p) < 260)
        drawLightningLine(activeFingers[a].p.x,activeFingers[a].p.y,activeFingers[b].p.x,activeFingers[b].p.y, hue+(a+b)*10, `h${hi}_${activeFingers[a].idx}_${activeFingers[b].idx}`);
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
  if (handStates.length >= 2) {
    const getNodes = state => {
      const out = [];
      const seen = new Set();
      state.activeTipIndices.forEach(tipIdx => {
        FINGER_CHAINS[tipIdx].forEach(idx => {
          if (seen.has(idx)) return;
          seen.add(idx);
          out.push({ idx, fi: TIPS.indexOf(tipIdx), p: state.pts[idx] });
        });
      });
      return out;
    };
    const nodes0 = getNodes(handStates[0]), nodes1 = getNodes(handStates[1]);
    for (const n0 of nodes0) {
      let best = null;
      for (const n1 of nodes1) {
        const d = dist2d(n0.p, n1.p);
        if (d >= 420) continue;
        if (!best || d < best.d) best = { n1, d };
      }
      if (best)
        drawLightningLine(n0.p.x,n0.p.y,best.n1.p.x,best.n1.p.y, 220+n0.fi*16+best.n1.fi*22, `cross_${n0.idx}_${best.n1.idx}`);
    }
  }
  for (const k in boltCache) if (boltCache[k].ttl <= 0) delete boltCache[k];
}

// ✨ PARTICLES
function drawParticlesFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const v = tipVel(hi, fi);
      drawDot(p.x, p.y, hue + fi * 18);
      const rate = 0.15 + clamp(v.speed/8, 0, 0.85);
      if (Math.random() < rate) spawnAt(p.x, p.y, hue+fi*18, Math.ceil(1+v.speed*.4), v.vx, v.vy);
    });
  });
}

// 🛡 AURA
function drawAuraFx(handStates) {
  const t = Date.now() / 1000;
  handStates.forEach(state => {
    const { hi, pts, activeFingers, fingerCount } = state;
    const hue = HAND_HUE[hi % 2];
    const palm = pts[0];
    const spread = activeFingers.length > 1
      ? activeFingers.reduce((sum, finger) => sum + dist2d(finger.p, palm), 0) / activeFingers.length
      : 70;
    const radius = 55 + spread * 0.35 + fingerCount * 10;
    const pulse = 0.92 + Math.sin(t * 2.4 + hi) * 0.08;
    const halo = ctx.createRadialGradient(palm.x, palm.y, 0, palm.x, palm.y, radius * 1.7);
    halo.addColorStop(0, `hsla(${hue},100%,78%,0.22)`);
    halo.addColorStop(0.55, `hsla(${hue + 35},100%,62%,0.12)`);
    halo.addColorStop(1, `hsla(${hue + 80},100%,50%,0)`);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(palm.x, palm.y, radius * 1.7 * pulse, 0, Math.PI * 2);
    ctx.fill();
    for (let ring = 0; ring < 3; ring++) {
      ctx.globalAlpha = 0.24 - ring * 0.05;
      ctx.strokeStyle = `hsla(${hue + ring * 18},100%,78%,1)`;
      ctx.lineWidth = 2.5 - ring * 0.55;
      ctx.shadowBlur = 16;
      ctx.shadowColor = `hsla(${hue + ring * 18},100%,70%,0.85)`;
      ctx.beginPath();
      ctx.arc(palm.x, palm.y, radius * pulse * (0.8 + ring * 0.22), 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
    activeFingers.forEach(({ p, fi }) => {
      ctx.save();
      ctx.strokeStyle = `hsla(${hue + fi * 18},100%,72%,0.45)`;
      ctx.lineWidth = 1.6;
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsla(${hue + fi * 18},100%,68%,0.75)`;
      ctx.beginPath();
      ctx.moveTo(palm.x, palm.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.restore();
      drawDot(p.x, p.y, hue + fi * 18, 12);
    });
  });
}

// 💥 NOVA
function drawNovaFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers, fingerCount } = state;
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, 25 + hi * 120 + fi * 24, 12));
    const cooldownKey = `hand_${hi}`;
    novaCooldown[cooldownKey] = Math.max(0, (novaCooldown[cooldownKey] || 0) - 1);
    if (fingerCount !== 2) return;

    const [a, b] = activeFingers;
    const midX = (a.p.x + b.p.x) * 0.5;
    const midY = (a.p.y + b.p.y) * 0.5;
    const avgSpeed = (tipVel(hi, a.fi).speed + tipVel(hi, b.fi).speed) * 0.5;
    const spread = dist2d(a.p, b.p);
    if (spread < 30 || novaCooldown[cooldownKey] > 0) return;

    if (avgSpeed > 5 || Math.random() < 0.08) {
      const hue = 35 + hi * 120 + ((a.fi + b.fi) * 24);
      novaBursts.push(new NovaBurst(midX, midY, hue, clamp(avgSpeed / 12, 0.5, 1.6)));
      for (let i = 0; i < 18 && particles.length < MAX_PART; i++) {
        const ang = rand(0, Math.PI * 2), spd = rand(2, 8);
        particles.push(new Particle(midX, midY, hue + rand(-30, 30), Math.cos(ang) * spd, Math.sin(ang) * spd));
      }
      novaCooldown[cooldownKey] = 8;
    }
  });
}

// 🌀 PORTAL
function drawPortalFx(handStates) {
  if (handStates.length < 2) {
    handStates.forEach(state => state.activeFingers.forEach(({ p, fi }) =>
      drawDot(p.x, p.y, HAND_HUE[state.hi % 2] + fi * 18, 10)
    ));
    return;
  }
  const leftPalm = handStates[0].pts[0];
  const rightPalm = handStates[1].pts[0];
  const palmDist = dist2d(leftPalm, rightPalm);
  if (palmDist > 460) {
    handStates.forEach(state => state.activeFingers.forEach(({ p, fi }) =>
      drawDot(p.x, p.y, HAND_HUE[state.hi % 2] + fi * 18, 10)
    ));
    return;
  }
  const cx = (leftPalm.x + rightPalm.x) * 0.5;
  const cy = (leftPalm.y + rightPalm.y) * 0.5;
  const rx = Math.max(60, palmDist * 0.32);
  const ry = 34 + Math.abs(leftPalm.y - rightPalm.y) * 0.12;
  const t = Date.now() / 1000;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.atan2(rightPalm.y - leftPalm.y, rightPalm.x - leftPalm.x));
  for (let ring = 0; ring < 4; ring++) {
    const hue = 190 + ring * 36 + Math.sin(t * 2 + ring) * 12;
    ctx.globalAlpha = 0.18 + ring * 0.04;
    ctx.strokeStyle = `hsla(${hue},100%,72%,1)`;
    ctx.lineWidth = 2.4 - ring * 0.35;
    ctx.shadowBlur = 14;
    ctx.shadowColor = `hsla(${hue},100%,66%,0.8)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, rx + ring * 8, ry + ring * 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  const core = ctx.createRadialGradient(0, 0, 0, 0, 0, rx * 1.15);
  core.addColorStop(0, 'rgba(255,255,255,0.2)');
  core.addColorStop(0.45, 'rgba(100,220,255,0.16)');
  core.addColorStop(1, 'rgba(100,220,255,0)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.ellipse(0, 0, rx * 1.05, ry * 1.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  for (const f0 of handStates[0].activeFingers) for (const f1 of handStates[1].activeFingers) {
    const d = dist2d(f0.p, f1.p);
    if (d > 340) continue;
    const hue = 180 + f0.fi * 18 + f1.fi * 22;
    ctx.save();
    ctx.globalAlpha = Math.max(0.16, 1 - d / 340) * 0.55;
    ctx.strokeStyle = `hsla(${hue},100%,76%,1)`;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsla(${hue},100%,70%,0.8)`;
    ctx.beginPath();
    ctx.moveTo(f0.p.x, f0.p.y);
    ctx.quadraticCurveTo(cx, cy, f1.p.x, f1.p.y);
    ctx.stroke();
    ctx.restore();
  }
}

// 🦴 RIGGING
function drawRigging(handStates) {
  handStates.forEach(state => {
    const { hi, pts, activeTipIndices, activeFingers, fingerCount } = state;
    if (fingerCount === 0) return;
    const hue = HAND_HUE[hi%2];
    const wrist = pts[0];
    const rootHue = 38;
    const palmHue = 195;
    const palmKeys = [0,5,9,13,17].map(i => pts[i]);
    const palmCenter = {
      x: (pts[0].x + pts[5].x + pts[9].x + pts[13].x + pts[17].x) / 5,
      y: (pts[0].y + pts[5].y + pts[9].y + pts[13].y + pts[17].y) / 5,
    };

    for (let i = 1; i < palmKeys.length; i++) {
      drawRigBone(palmKeys[i - 1], palmKeys[i], palmHue + i * 4, 9, 0.75);
      drawRigJoint(palmKeys[i].x, palmKeys[i].y, 4.8, palmHue + i * 6, 0.9);
    }
    drawRigBone(wrist, palmCenter, rootHue, 10, 0.9);
    drawRigJoint(wrist.x, wrist.y, 7, rootHue, 1);
    drawRigJoint(palmCenter.x, palmCenter.y, 6.2, palmHue, 1);
    drawRigAxis(wrist, pts[9], rootHue, 1.1);
    drawRigLabel(wrist.x, wrist.y - 18, `MASTER_${hi + 1}`, rootHue, 0.95);
    drawRigLabel(palmCenter.x, palmCenter.y + 18, `PALM_CTRL`, palmHue, 0.9);
    drawRigParentLine(wrist, palmCenter, rootHue, 0.7);

    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = `hsla(${rootHue},100%,82%,0.85)`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.roundRect(wrist.x - 18, wrist.y - 18, 36, 36, 6);
    ctx.stroke();
    ctx.restore();

    activeTipIndices.forEach((tipIdx, chainOrder) => {
      const chain = [0, ...FINGER_CHAINS[tipIdx]];
      const fingerName = ['THUMB', 'INDEX', 'MIDDLE', 'RING', 'PINKY'][TIPS.indexOf(tipIdx)];
      const fingerHue = hue + chainOrder * 18;
      for (let i = 1; i < chain.length; i++) {
        const a = pts[chain[i - 1]], b = pts[chain[i]];
        const boneHue = fingerHue + i * 4;
        drawRigBone(a, b, boneHue, i === chain.length - 1 ? 6.5 : 8, 1);
        drawRigJoint(b.x, b.y, i === chain.length - 1 ? 5.4 : 4.4, boneHue, 1);
        drawRigParentLine(a, b, boneHue, 0.38);
        if (i < chain.length - 1) {
          drawRigAxis(b, a, boneHue, 0.78);
          drawRigLabel(b.x, b.y - 14, `${fingerName}_FK${i}`, boneHue, 0.68);
        }
      }
      const tip = pts[tipIdx];
      drawRigLabel(tip.x, tip.y - 18, `${fingerName}_IK`, fingerHue, 0.86);
    });

    activeFingers.forEach(({ p, fi }) => {
      const ctrlHue = hue + fi * 16;
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.strokeStyle = `hsla(${ctrlHue},100%,82%,0.95)`;
      ctx.fillStyle = 'rgba(14,18,24,0.95)';
      ctx.lineWidth = 1.6;
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsla(${ctrlHue},100%,72%,0.5)`;
      ctx.beginPath();
      ctx.roundRect(p.x - 8, p.y - 8, 16, 16, 4);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
      drawRigParentLine(p, palmCenter, ctrlHue, 0.55);
      drawRigAxis(p, wrist, ctrlHue, 0.65);
    });
  });
  if (handStates.length >= 2) {
    const wrist0 = handStates[0].pts[0], wrist1 = handStates[1].pts[0];
    if (dist2d(wrist0, wrist1) < 420) {
      drawRigBone(wrist0, wrist1, 260, 6, 0.55);
      drawRigJoint((wrist0.x + wrist1.x) * 0.5, (wrist0.y + wrist1.y) * 0.5, 4.2, 260, 0.8);
    }
  }
}

// 🎆 FIREWORKS
const fwPrevSpeed = {};
function drawFireworksFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const v = tipVel(hi,fi), key = `${hi}_${fi}`;
      const prev = fwPrevSpeed[key] || 0;
      if (v.speed > 9 && prev < 5) {
        const n = Math.floor(rand(16,34));
        for (let i = 0; i < n && particles.length < MAX_PART; i++) {
          const a = rand(0,Math.PI*2), spd = rand(3,14);
          particles.push(new Particle(p.x,p.y, hue+fi*25+rand(-40,40), Math.cos(a)*spd, Math.sin(a)*spd));
        }
      }
      fwPrevSpeed[key] = v.speed;
      if (Math.random() < 0.3+clamp(v.speed/15,0,0.6))
        spawnAt(p.x,p.y, hue+fi*18, 2, v.vx*.2, v.vy*.2);
      drawDot(p.x, p.y, hue+fi*14);
    });
  });
}

// 🔮 ORBS
function drawOrbsFx(handStates) {
  const t = Date.now()/1000;
  const activeKeys = new Set();
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const key = `${hi}_${fi}`;
      activeKeys.add(key);
      const orb = getOrb(key, p.x, p.y, hue+fi*20);
      orb.x = lerp(orb.x, orb.tx, 0.12); orb.y = lerp(orb.y, orb.ty, 0.12);
      orb.angle += 0.04 + fi*.008;
      const r = 28 + 8*Math.sin(t*2+fi*1.4);
      ctx.save();
      const g = ctx.createRadialGradient(orb.x,orb.y,0,orb.x,orb.y,r*3);
      g.addColorStop(0, `hsla(${orb.hue},100%,80%,0.35)`);
      g.addColorStop(0.5,`hsla(${orb.hue},100%,60%,0.12)`);
      g.addColorStop(1, `hsla(${orb.hue},100%,50%,0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(orb.x,orb.y,r*3,0,Math.PI*2); ctx.fill(); ctx.restore();
      for (let i = 0; i < 4; i++) {
        const a = orb.angle+(i/4)*Math.PI*2;
        ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=`hsla(${orb.hue+i*10},100%,70%,1)`;
        ctx.fillStyle=`hsla(${orb.hue+i*10},100%,85%,0.85)`;
        ctx.beginPath(); ctx.arc(orb.x+Math.cos(a)*r, orb.y+Math.sin(a)*r, 3.5,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      drawDot(orb.x,orb.y,orb.hue,16);
    });
  });
  for (const key of Object.keys(orbs)) if (!activeKeys.has(key)) delete orbs[key];
  if (handStates.length >= 2) {
    for (const f0 of handStates[0].activeFingers) for (const f1 of handStates[1].activeFingers) {
      const o0=orbs[`0_${f0.fi}`], o1=orbs[`1_${f1.fi}`];
      if (!o0||!o1) continue;
      const d=dist2d(o0,o1); if (d>500) continue;
      ctx.save(); ctx.globalAlpha=(1-d/500)*.6;
      ctx.strokeStyle=`hsla(${250+f0.fi*14+f1.fi*8},100%,70%,1)`; ctx.lineWidth=2;
      ctx.shadowBlur=16; ctx.shadowColor=`hsla(${250+f0.fi*14+f1.fi*8},100%,65%,0.8)`;
      ctx.beginPath(); ctx.moveTo(o0.x,o0.y); ctx.lineTo(o1.x,o1.y); ctx.stroke(); ctx.restore();
    }
  }
}

// ── Video draw ────────────────────────────────────────────────────────────────
function drawVideo() {
  if (video.readyState < 2) return;
  vidCtx.save(); vidCtx.translate(W,0); vidCtx.scale(-1,1);
  vidCtx.drawImage(video,0,0,W,H); vidCtx.restore();
}

// ── Main render ───────────────────────────────────────────────────────────────
let lastResults = null;

function render() {
  requestAnimationFrame(render);
  drawVideo();
  ctx.clearRect(0,0,W,H);

  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i,1);
  }
  for (let i = novaBursts.length - 1; i >= 0; i--) {
    novaBursts[i].update(); novaBursts[i].draw();
    if (novaBursts[i].life <= 0) novaBursts.splice(i,1);
  }

  // Need multiHandLandmarks from old API
  const rawHands = lastResults && lastResults.multiHandLandmarks;
  if (!rawHands || rawHands.length === 0) {
    if (activeFx === 'orbs') for (const k in orbs) delete orbs[k];
    return;
  }

  const allPts = rawHands.map(lms => lms.map(lm2s));
  const handStates = rawHands.map((lms, hi) => buildHandState(lms, allPts[hi], hi));
  updateVelocity(allPts);
  if (handStates.every(state => state.fingerCount === 0)) {
    if (activeFx === 'orbs') for (const k in orbs) delete orbs[k];
    return;
  }

  handStates.forEach(state => {
    const { hi, pts, fingerCount } = state;
    if (fingerCount === 0) return;
    const hue=HAND_HUE[hi%2], palm=pts[0];
    const pg=ctx.createRadialGradient(palm.x,palm.y,0,palm.x,palm.y,75);
    pg.addColorStop(0,`hsla(${hue},100%,70%,0.15)`);
    pg.addColorStop(1,`hsla(${hue},100%,50%,0)`);
    ctx.save(); ctx.fillStyle=pg; ctx.beginPath();
    ctx.arc(palm.x,palm.y,75,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  if (activeFx==='web')       drawWeb(handStates);
  if (activeFx==='warp')      drawWarp(handStates);
  if (activeFx==='lightning') drawLightningFx(handStates);
  if (activeFx==='particles') drawParticlesFx(handStates);
  if (activeFx==='aura')      drawAuraFx(handStates);
  if (activeFx==='rigging')   drawRigging(handStates);
  if (activeFx==='fireworks') drawFireworksFx(handStates);
  if (activeFx==='nova')      drawNovaFx(handStates);
  if (activeFx==='portal')    drawPortalFx(handStates);
  if (activeFx==='orbs')      drawOrbsFx(handStates);
}

// ── Dynamic script loader with error handling ────────────────────────────────
function loadScript(url, label) {
  return new Promise((resolve, reject) => {
    statusEl.textContent = `Loading ${label}…`;
    console.log(`[MagicHands] Loading ${label}: ${url}`);
    const s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload  = () => { console.log(`[MagicHands] ✅ ${label} loaded`); resolve(); };
    s.onerror = () => reject(new Error(`Failed to load ${label} from ${url}`));
    document.head.appendChild(s);
  });
}

async function init() {
  try {
    // Step 1: Load MediaPipe Hands
    const HANDS_VER = '0.4.1675469240';
    await loadScript(`https://cdn.jsdelivr.net/npm/@mediapipe/hands@${HANDS_VER}/hands.js`, 'hands model');

    // Step 2: Verify globals exist
    if (typeof Hands === 'undefined') throw new Error('Hands class not found — script loaded but empty');

    // Step 3: Create hand tracker
    statusEl.textContent = 'Initializing hand tracker…';
    console.log('[MagicHands] Creating Hands instance…');
    const hands = new Hands({
      locateFile: file => {
        const url = `https://cdn.jsdelivr.net/npm/@mediapipe/hands@${HANDS_VER}/${file}`;
        console.log(`[MagicHands] locateFile: ${file} → ${url}`);
        return url;
      }
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    hands.onResults(results => {
      lastResults = results;
      const rawHands = results.multiHandLandmarks || [];
      if (rawHands.length === 0) {
        statusEl.textContent = 'Show your hands';
        return;
      }
      const handStates = rawHands.map((lms, hi) => buildHandState(lms, lms, hi));
      const counts = handStates.map((state, hi) =>
        state.fingerCount === 0
          ? `Hand ${hi + 1}: fist`
          : `Hand ${hi + 1}: ${state.fingerCount} finger${state.fingerCount > 1 ? 's' : ''}`
      );
      statusEl.textContent = counts.join(' | ');
    });

    // Step 4: Warm up the model with a blank canvas (forces WASM/model download)
    statusEl.textContent = 'Downloading model files…';
    console.log('[MagicHands] Warming up model with blank frame…');
    const tmp = document.createElement('canvas');
    tmp.width = 320; tmp.height = 240;
    tmp.getContext('2d').fillRect(0, 0, 320, 240);
    await hands.send({ image: tmp });
    console.log('[MagicHands] ✅ Model warm-up complete');

    // Step 5: Start camera
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('getUserMedia is not supported in this browser');
    }
    statusEl.textContent = 'Allow camera access…';
    console.log('[MagicHands] Requesting camera…');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    statusEl.textContent = 'Starting camera…';
    video.srcObject = stream;
    video.setAttribute('playsinline', '');
    await video.play();
    console.log(`[MagicHands] ✅ Camera started: ${video.videoWidth}x${video.videoHeight}`);
    statusEl.textContent = 'Show your hands';

    // Step 6: Detection loop (manual rAF, no Camera utility dependency)
    let busy = false;
    async function detect() {
      if (video.readyState >= 2 && !busy) {
        busy = true;
        try { await hands.send({ image: video }); } catch(e) { console.warn('detect:', e); }
        busy = false;
      }
      requestAnimationFrame(detect);
    }
    detect();

  } catch (err) {
    statusEl.textContent = `❌ ${err.message}`;
    statusEl.style.color = '#ff6666';
    console.error('[MagicHands] Init failed:', err);
  }
}

render();
init();
</script>

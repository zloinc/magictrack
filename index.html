<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>✨ Magic Hands</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #ui {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 7px 17px; border: 1px solid rgba(255,255,255,0.18); border-radius: 30px;
      background: rgba(255,255,255,0.05); color: #999; cursor: pointer;
      font-size: 12px; backdrop-filter: blur(8px); transition: all .2s; user-select: none;
    }
    .btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .btn.active {
      background: rgba(120,60,255,0.48); border-color: #a06aff;
      color: #fff; box-shadow: 0 0 16px rgba(150,80,255,0.55);
    }
    #status {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 1px;
      z-index: 10; pointer-events: none;
    }
    video { display: none; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    #video-canvas { z-index: 0; }
    #fx-canvas    { z-index: 1; }
  </style>
</head>
<body>

<canvas id="video-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<video id="video" playsinline></video>

<div id="ui">
  <div class="btn active" data-fx="web">🕸 Web</div>
  <div class="btn" data-fx="warp">🌀 Warp</div>
  <div class="btn" data-fx="lightning">⚡ Lightning</div>
  <div class="btn" data-fx="particles">✨ Particles</div>
  <div class="btn" data-fx="trails">🔥 Trails</div>
  <div class="btn" data-fx="rigging">🦴 Rigging</div>
  <div class="btn" data-fx="fireworks">🎆 Fireworks</div>
  <div class="btn" data-fx="orbs">🔮 Orbs</div>
</div>
<div id="status">Loading model…</div>

<script>
// ── Canvases ──────────────────────────────────────────────────────────────────
const vidCanvas = document.getElementById('video-canvas');
const vidCtx    = vidCanvas.getContext('2d');
const fxCanvas  = document.getElementById('fx-canvas');
const ctx       = fxCanvas.getContext('2d');
const video     = document.getElementById('video');
const statusEl  = document.getElementById('status');
let W = 0, H = 0;
function resize() {
  W = vidCanvas.width = fxCanvas.width  = window.innerWidth;
  H = vidCanvas.height = fxCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resize); resize();

// ── Effect radio ──────────────────────────────────────────────────────────────
let activeFx = 'web';
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFx = btn.dataset.fx;
    particles.length = 0;
    for (const k in trails) delete trails[k];
    for (const k in orbs)   delete orbs[k];
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
const rand   = (a, b) => Math.random() * (b - a) + a;
const dist2d = (a, b)  => Math.hypot(a.x - b.x, a.y - b.y);
const lerp   = (a, b, t) => a + (b - a) * t;
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
// Mirror x for selfie view
const lm2s   = lm => ({ x: (1 - lm.x) * W, y: lm.y * H });

const TIPS = [4, 8, 12, 16, 20];
const FINGER_CHAINS = {
  4: [1,2,3,4],
  8: [5,6,7,8],
  12: [9,10,11,12],
  16: [13,14,15,16],
  20: [17,18,19,20],
};
const HAND_HUE = [200, 300];
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

function rawDist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
}

function getOpenFingerIndices(rawLms) {
  const open = [];
  const thumbOpen =
    rawDist(rawLms[4], rawLms[0]) > rawDist(rawLms[3], rawLms[0]) * 1.12 &&
    rawDist(rawLms[4], rawLms[5]) > rawDist(rawLms[3], rawLms[5]) * 1.05;
  if (thumbOpen) open.push(4);

  [[8,6,5], [12,10,9], [16,14,13], [20,18,17]].forEach(([tip, pip, mcp]) => {
    if (rawLms[tip].y < rawLms[pip].y - 0.015 && rawLms[pip].y < rawLms[mcp].y) open.push(tip);
  });
  return open;
}

function buildHandState(rawLms, pts, hi) {
  const activeTipIndices = getOpenFingerIndices(rawLms);
  const activeFingers = activeTipIndices.map(idx => ({
    idx,
    fi: TIPS.indexOf(idx),
    p: pts[idx],
  }));
  return {
    hi,
    pts,
    activeTipIndices,
    activeFingers,
    fingerCount: activeFingers.length,
  };
}

// ── Velocity tracking ─────────────────────────────────────────────────────────
const prevLm   = {};
const velLm    = {};
let   handPosFlat = [];

function updateVelocity(allPts) {
  handPosFlat = [];
  allPts.forEach((pts, hi) => {
    pts.forEach((p, li) => {
      const key = `${hi}_${li}`;
      if (prevLm[key]) {
        const vx = p.x - prevLm[key].x, vy = p.y - prevLm[key].y;
        velLm[key] = { vx, vy, speed: Math.hypot(vx, vy) };
      } else {
        velLm[key] = { vx: 0, vy: 0, speed: 0 };
      }
      prevLm[key] = { x: p.x, y: p.y };
      handPosFlat.push({ x: p.x, y: p.y, ...velLm[key] });
    });
  });
}
function tipVel(hi, fi) { return velLm[`${hi}_${TIPS[fi]}`] || { vx:0, vy:0, speed:0 }; }

// ── Particles ─────────────────────────────────────────────────────────────────
const particles = [];
const MAX_PART  = 1200;

class Particle {
  constructor(x, y, hue, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx + rand(-2, 2); this.vy = vy + rand(-3, 1);
    this.life  = 1; this.decay = rand(0.008, 0.022);
    this.r     = rand(3, 18); this.hue = hue + rand(-30, 30);
    this.grav  = rand(0.03, 0.12);
  }
  update() {
    this.vy += this.grav; this.vx *= 0.97; this.vy *= 0.97;
    this.x  += this.vx;  this.y  += this.vy;
    this.life -= this.decay;
    for (const h of handPosFlat) {
      const dx = this.x - h.x, dy = this.y - h.y, d = Math.hypot(dx, dy);
      if (d < 90 && d > 0.5) {
        const f = ((90 - d) / 90) * 1.4;
        this.vx += (dx / d) * f + h.vx * 0.25;
        this.vy += (dy / d) * f + h.vy * 0.25;
      }
    }
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save(); ctx.globalAlpha = clamp(this.life, 0, 1);
    const r = this.r * (0.4 + 0.6 * this.life);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 2);
    g.addColorStop(0,   `hsla(${this.hue},100%,92%,1)`);
    g.addColorStop(0.5, `hsla(${this.hue},100%,70%,0.6)`);
    g.addColorStop(1,   `hsla(${this.hue},100%,50%,0)`);
    ctx.fillStyle = g; ctx.beginPath();
    ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
}
function spawnAt(x, y, hue, n = 4, vx = 0, vy = 0) {
  for (let i = 0; i < n && particles.length < MAX_PART; i++)
    particles.push(new Particle(x, y, hue, vx * 0.4, vy * 0.4));
}

// ── Trails ────────────────────────────────────────────────────────────────────
const trails = {};
function pushTrail(key, x, y, hue) {
  if (!trails[key]) trails[key] = [];
  trails[key].push({ x, y, hue });
  if (trails[key].length > 50) trails[key].shift();
}

// ── Orbs ──────────────────────────────────────────────────────────────────────
const orbs = {};
function getOrb(key, tx, ty, hue) {
  if (!orbs[key]) orbs[key] = { x: tx, y: ty, tx, ty, hue, angle: 0 };
  orbs[key].tx = tx; orbs[key].ty = ty; orbs[key].hue = hue;
  return orbs[key];
}

// ── Glow dot ──────────────────────────────────────────────────────────────────
function drawDot(x, y, hue, r = 13) {
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 180);
  ctx.save(); ctx.shadowBlur = 22; ctx.shadowColor = `hsla(${hue},100%,70%,1)`;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * pulse);
  g.addColorStop(0, `hsla(${hue},100%,96%,1)`);
  g.addColorStop(1, `hsla(${hue},100%,60%,0)`);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * pulse, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}

// ── Capsule clip ──────────────────────────────────────────────────────────────
function capsulePath(x1, y1, x2, y2, thick) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const px = -Math.sin(angle) * thick, py = Math.cos(angle) * thick;
  ctx.beginPath();
  ctx.moveTo(x1 + px, y1 + py); ctx.lineTo(x2 + px, y2 + py);
  ctx.arc(x2, y2, thick, angle - Math.PI / 2, angle + Math.PI / 2);
  ctx.lineTo(x1 - px, y1 - py);
  ctx.arc(x1, y1, thick, angle + Math.PI / 2, angle - Math.PI / 2);
  ctx.closePath();
}

// ════════ EFFECTS ════════════════════════════════════════════════════════════

// 🕸 WEB
function drawWeb(handStates) {
  handStates.forEach(state => {
    const { hi, pts, activeFingers, activeTipIndices } = state;
    const hue = HAND_HUE[hi % 2];
    activeTipIndices.forEach(idx => {
      const chain = FINGER_CHAINS[idx];
      for (let i = 0; i < chain.length; i++) {
        const a = i === 0 ? 0 : chain[i - 1];
        const b = chain[i];
        ctx.save(); ctx.strokeStyle = `hsla(${hue},80%,60%,0.42)`;
        ctx.lineWidth = 1.5; ctx.shadowBlur = 6; ctx.shadowColor = `hsla(${hue},100%,60%,0.42)`;
        ctx.beginPath(); ctx.moveTo(pts[a].x, pts[a].y); ctx.lineTo(pts[b].x, pts[b].y); ctx.stroke(); ctx.restore();
      }
    });
    for (let a = 0; a < activeFingers.length; a++) for (let b = a + 1; b < activeFingers.length; b++) {
      const d = dist2d(activeFingers[a].p, activeFingers[b].p), alpha = Math.max(0, 1 - d / 340);
      if (alpha < 0.02) continue;
      const grad = ctx.createLinearGradient(activeFingers[a].p.x, activeFingers[a].p.y, activeFingers[b].p.x, activeFingers[b].p.y);
      grad.addColorStop(0, `hsla(${hue + a * 12},100%,70%,1)`);
      grad.addColorStop(1, `hsla(${hue + b * 12},100%,70%,1)`);
      ctx.save(); ctx.globalAlpha = alpha * 0.85; ctx.strokeStyle = grad;
      ctx.lineWidth = 3 * alpha; ctx.shadowBlur = 14; ctx.shadowColor = `hsla(${hue},100%,65%,0.7)`;
      ctx.beginPath(); ctx.moveTo(activeFingers[a].p.x, activeFingers[a].p.y); ctx.lineTo(activeFingers[b].p.x, activeFingers[b].p.y); ctx.stroke(); ctx.restore();
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
}

// 🌀 WARP
function drawWarpLine(x1, y1, x2, y2, hue) {
  const d = Math.hypot(x2 - x1, y2 - y1);
  if (d < 24 || d > 420) return;

  const t = Date.now() / 1000;
  const mix = clamp(1 - (d - 40) / 340, 0, 1);
  const thick = 18 + mix * 26;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const perpX = -Math.sin(angle), perpY = Math.cos(angle);
  const midX = (x1 + x2) * 0.5;
  const midY = (y1 + y2) * 0.5;
  const wobble = Math.sin(t * 3.3 + hue * 0.03 + d * 0.01) * thick * 0.45;
  const sag = thick * (0.35 + mix * 0.8);
  const cx = midX + perpX * wobble;
  const cy = midY + perpY * wobble + sag;

  const startHue = (hue - 35 + 360) % 360;
  const midHue = (hue + 28) % 360;
  const endHue = (hue + 95) % 360;
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0, `hsla(${startHue},100%,72%,${0.26 + mix * 0.16})`);
  g.addColorStop(0.5, `hsla(${midHue},100%,76%,${0.32 + mix * 0.2})`);
  g.addColorStop(1, `hsla(${endHue},100%,72%,${0.26 + mix * 0.16})`);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.beginPath();
  ctx.moveTo(x1 + perpX * thick, y1 + perpY * thick);
  ctx.quadraticCurveTo(cx + perpX * thick * 0.45, cy + perpY * thick * 0.45, x2 + perpX * thick, y2 + perpY * thick);
  ctx.arc(x2, y2, thick, angle - Math.PI / 2, angle + Math.PI / 2);
  ctx.quadraticCurveTo(cx - perpX * thick * 0.45, cy - perpY * thick * 0.45, x1 - perpX * thick, y1 - perpY * thick);
  ctx.arc(x1, y1, thick, angle + Math.PI / 2, angle - Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.shadowBlur = 26 + mix * 24;
  ctx.shadowColor = `hsla(${midHue},100%,70%,0.65)`;
  ctx.fill();

  const core = ctx.createLinearGradient(x1, y1, x2, y2);
  core.addColorStop(0, `hsla(${startHue},100%,92%,0.18)`);
  core.addColorStop(0.5, `hsla(${midHue},100%,94%,${0.2 + mix * 0.18})`);
  core.addColorStop(1, `hsla(${endHue},100%,92%,0.18)`);
  ctx.beginPath();
  ctx.moveTo(x1 + perpX * thick * 0.45, y1 + perpY * thick * 0.45);
  ctx.quadraticCurveTo(cx + perpX * thick * 0.18, cy + perpY * thick * 0.18, x2 + perpX * thick * 0.45, y2 + perpY * thick * 0.45);
  ctx.quadraticCurveTo(cx - perpX * thick * 0.18, cy - perpY * thick * 0.18, x1 - perpX * thick * 0.45, y1 - perpY * thick * 0.45);
  ctx.closePath();
  ctx.fillStyle = core;
  ctx.fill();

  ctx.strokeStyle = `hsla(${midHue},100%,88%,${0.2 + mix * 0.2})`;
  ctx.lineWidth = 1.2 + mix * 1.8;
  ctx.shadowBlur = 10;
  ctx.shadowColor = `hsla(${endHue},100%,82%,0.7)`;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cx, cy, x2, y2);
  ctx.stroke();

  for (let s = 0; s < 3; s++) {
    const strandHue = (startHue + s * 48) % 360;
    const strandOffset = (s - 1) * thick * 0.22;
    ctx.beginPath();
    ctx.strokeStyle = `hsla(${strandHue},100%,80%,${0.16 + mix * 0.08})`;
    ctx.lineWidth = 1 + s * 0.45;
    ctx.moveTo(x1 + perpX * strandOffset, y1 + perpY * strandOffset);
    ctx.quadraticCurveTo(cx + perpX * strandOffset * 0.65, cy + perpY * strandOffset * 0.65, x2 + perpX * strandOffset, y2 + perpY * strandOffset);
    ctx.stroke();
  }
  ctx.restore();
}
function drawWarp(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    for (let a = 0; a < activeFingers.length; a++) for (let b = a + 1; b < activeFingers.length; b++) {
      const d = dist2d(activeFingers[a].p, activeFingers[b].p);
      if (d < 320) drawWarpLine(activeFingers[a].p.x, activeFingers[a].p.y, activeFingers[b].p.x, activeFingers[b].p.y, hue + a * 32 + b * 18);
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
  if (handStates.length >= 2) {
    const active0 = handStates[0].activeFingers, active1 = handStates[1].activeFingers;
    for (let a = 0; a < active0.length; a++) for (let b = 0; b < active1.length; b++) {
      const d = dist2d(active0[a].p, active1[b].p);
      if (d < 420) drawWarpLine(active0[a].p.x, active0[a].p.y, active1[b].p.x, active1[b].p.y, 250 + a * 18 + b * 26);
    }
  }
}

// ⚡ LIGHTNING
const boltCache = {};
function buildBolt(x1, y1, x2, y2, depth, spread) {
  if (depth === 0) return [[x1, y1, x2, y2]];
  const mx = (x1+x2)/2 + rand(-spread,spread), my = (y1+y2)/2 + rand(-spread,spread);
  return [...buildBolt(x1,y1,mx,my,depth-1,spread*.6), ...buildBolt(mx,my,x2,y2,depth-1,spread*.6)];
}
function getBolt(key, x1, y1, x2, y2, spread) {
  if (!boltCache[key] || --boltCache[key].ttl <= 0)
    boltCache[key] = { segs: buildBolt(x1,y1,x2,y2,4,spread), ttl: 6 };
  return boltCache[key].segs;
}
function drawLightningLine(x1, y1, x2, y2, hue, key) {
  const d = dist2d({x:x1,y:y1},{x:x2,y:y2}), segs = getBolt(key,x1,y1,x2,y2,d*.14);
  [5,1.5].forEach((lw, pass) => {
    ctx.save(); ctx.globalAlpha = pass===0?.25:1;
    ctx.strokeStyle = `hsla(${hue},100%,${pass===0?60:94}%,1)`; ctx.lineWidth = lw;
    ctx.shadowBlur = pass===1?24:0; ctx.shadowColor = `hsla(${hue},100%,70%,1)`;
    ctx.beginPath();
    for (const [ax,ay,bx,by] of segs) { ctx.moveTo(ax,ay); ctx.lineTo(bx,by); }
    ctx.stroke(); ctx.restore();
  });
}
function drawLightningFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    for (let a = 0; a < activeFingers.length; a++) for (let b = a+1; b < activeFingers.length; b++) {
      if (dist2d(activeFingers[a].p, activeFingers[b].p) < 280)
        drawLightningLine(activeFingers[a].p.x,activeFingers[a].p.y,activeFingers[b].p.x,activeFingers[b].p.y, hue+(a+b)*10, `h${hi}_${activeFingers[a].idx}_${activeFingers[b].idx}`);
    }
    activeFingers.forEach(({ p, fi }) => drawDot(p.x, p.y, hue + fi * 14));
  });
  if (handStates.length >= 2) {
    const active0 = handStates[0].activeFingers, active1 = handStates[1].activeFingers;
    for (const f0 of active0) for (const f1 of active1) {
      if (dist2d(f0.p,f1.p) < 560)
        drawLightningLine(f0.p.x,f0.p.y,f1.p.x,f1.p.y, 220+f0.fi*16+f1.fi*22, `cross_${f0.idx}_${f1.idx}`);
    }
  }
  for (const k in boltCache) if (boltCache[k].ttl <= 0) delete boltCache[k];
}

// ✨ PARTICLES
function drawParticlesFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const v = tipVel(hi, fi);
      drawDot(p.x, p.y, hue + fi * 18);
      const rate = 0.15 + clamp(v.speed/8, 0, 0.85);
      if (Math.random() < rate) spawnAt(p.x, p.y, hue+fi*18, Math.ceil(1+v.speed*.4), v.vx, v.vy);
    });
  });
}

// 🔥 TRAILS
function drawTrailsFx(handStates) {
  const activeKeys = new Set();
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const key = `${hi}_${fi}`;
      activeKeys.add(key);
      drawDot(p.x, p.y, hue + fi * 18);
      pushTrail(key, p.x, p.y, hue + fi * 18);
    });
  });
  for (const key of Object.keys(trails)) if (!activeKeys.has(key)) delete trails[key];
}

// 🦴 RIGGING
function drawRigging(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2], n = activeFingers.length;
    for (let a = 0; a < n; a++) for (let b = a+1; b < n; b++) {
      const pa = activeFingers[a].p, pb = activeFingers[b].p;
      const d = dist2d(pa, pb), alpha = Math.max(0, 1 - d/420);
      if (alpha < 0.04) continue;
      const grad = ctx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
      grad.addColorStop(0, `hsla(${hue+a*5},100%,72%,1)`);
      grad.addColorStop(1, `hsla(${hue+b*5},100%,72%,1)`);
      ctx.save(); ctx.globalAlpha = alpha*.6; ctx.strokeStyle = grad;
      ctx.lineWidth = 1.2+alpha*2; ctx.shadowBlur = 8; ctx.shadowColor = `hsla(${hue},100%,65%,0.5)`;
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke(); ctx.restore();
    }
    activeFingers.forEach(({ p, fi }) => {
      const dh = hue+fi*10;
      ctx.save(); ctx.shadowBlur=12; ctx.shadowColor=`hsla(${dh},100%,70%,0.9)`;
      ctx.fillStyle=`hsla(${dh},100%,90%,0.9)`; ctx.beginPath();
      ctx.arc(p.x,p.y,5,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
  });
  if (handStates.length >= 2) {
    const active0 = handStates[0].activeFingers, active1 = handStates[1].activeFingers;
    for (let a = 0; a < active0.length; a++) for (let b = 0; b < active1.length; b++) {
      const d = dist2d(active0[a].p,active1[b].p), alpha = Math.max(0, 1-d/480);
      if (alpha < 0.04) continue;
      ctx.save(); ctx.globalAlpha = alpha*.3;
      ctx.strokeStyle = `hsla(${260+(a+b)*4},100%,75%,1)`;
      ctx.lineWidth = 0.8+alpha*1.5; ctx.shadowBlur=5; ctx.shadowColor=`hsla(260,100%,65%,0.4)`;
      ctx.beginPath(); ctx.moveTo(active0[a].p.x,active0[a].p.y); ctx.lineTo(active1[b].p.x,active1[b].p.y); ctx.stroke(); ctx.restore();
    }
  }
}

// 🎆 FIREWORKS
const fwPrevSpeed = {};
function drawFireworksFx(handStates) {
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const v = tipVel(hi,fi), key = `${hi}_${fi}`;
      const prev = fwPrevSpeed[key] || 0;
      if (v.speed > 9 && prev < 5) {
        const n = Math.floor(rand(25,55));
        for (let i = 0; i < n && particles.length < MAX_PART; i++) {
          const a = rand(0,Math.PI*2), spd = rand(3,14);
          particles.push(new Particle(p.x,p.y, hue+fi*25+rand(-40,40), Math.cos(a)*spd, Math.sin(a)*spd));
        }
      }
      fwPrevSpeed[key] = v.speed;
      if (Math.random() < 0.3+clamp(v.speed/15,0,0.6))
        spawnAt(p.x,p.y, hue+fi*18, 2, v.vx*.2, v.vy*.2);
      drawDot(p.x, p.y, hue+fi*14);
    });
  });
}

// 🔮 ORBS
function drawOrbsFx(handStates) {
  const t = Date.now()/1000;
  const activeKeys = new Set();
  handStates.forEach(state => {
    const { hi, activeFingers } = state;
    const hue = HAND_HUE[hi%2];
    activeFingers.forEach(({ p, fi }) => {
      const key = `${hi}_${fi}`;
      activeKeys.add(key);
      const orb = getOrb(key, p.x, p.y, hue+fi*20);
      orb.x = lerp(orb.x, orb.tx, 0.12); orb.y = lerp(orb.y, orb.ty, 0.12);
      orb.angle += 0.04 + fi*.008;
      const r = 32 + 10*Math.sin(t*2+fi*1.4);
      ctx.save();
      const g = ctx.createRadialGradient(orb.x,orb.y,0,orb.x,orb.y,r*3);
      g.addColorStop(0, `hsla(${orb.hue},100%,80%,0.35)`);
      g.addColorStop(0.5,`hsla(${orb.hue},100%,60%,0.12)`);
      g.addColorStop(1, `hsla(${orb.hue},100%,50%,0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(orb.x,orb.y,r*3,0,Math.PI*2); ctx.fill(); ctx.restore();
      for (let i = 0; i < 6; i++) {
        const a = orb.angle+(i/6)*Math.PI*2;
        ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=`hsla(${orb.hue+i*10},100%,70%,1)`;
        ctx.fillStyle=`hsla(${orb.hue+i*10},100%,85%,0.85)`;
        ctx.beginPath(); ctx.arc(orb.x+Math.cos(a)*r, orb.y+Math.sin(a)*r, 3.5,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      drawDot(orb.x,orb.y,orb.hue,16);
    });
  });
  for (const key of Object.keys(orbs)) if (!activeKeys.has(key)) delete orbs[key];
  if (handStates.length >= 2) {
    for (const f0 of handStates[0].activeFingers) for (const f1 of handStates[1].activeFingers) {
      const o0=orbs[`0_${f0.fi}`], o1=orbs[`1_${f1.fi}`];
      if (!o0||!o1) continue;
      const d=dist2d(o0,o1); if (d>500) continue;
      ctx.save(); ctx.globalAlpha=(1-d/500)*.6;
      ctx.strokeStyle=`hsla(${250+f0.fi*14+f1.fi*8},100%,70%,1)`; ctx.lineWidth=2;
      ctx.shadowBlur=16; ctx.shadowColor=`hsla(${250+f0.fi*14+f1.fi*8},100%,65%,0.8)`;
      ctx.beginPath(); ctx.moveTo(o0.x,o0.y); ctx.lineTo(o1.x,o1.y); ctx.stroke(); ctx.restore();
    }
  }
}

// ── Video draw ────────────────────────────────────────────────────────────────
function drawVideo() {
  if (video.readyState < 2) return;
  vidCtx.save(); vidCtx.translate(W,0); vidCtx.scale(-1,1);
  vidCtx.drawImage(video,0,0,W,H); vidCtx.restore();
}

// ── Main render ───────────────────────────────────────────────────────────────
let lastResults = null;

function render() {
  requestAnimationFrame(render);
  drawVideo();
  ctx.clearRect(0,0,W,H);

  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update(); particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i,1);
  }
  if (activeFx === 'trails') {
    for (const key of Object.keys(trails)) {
      const pts = trails[key];
      for (let i = 1; i < pts.length; i++) {
        const a=pts[i-1], b=pts[i], t=i/pts.length;
        ctx.save(); ctx.globalAlpha=t*.8; ctx.strokeStyle=`hsla(${b.hue},100%,70%,1)`;
        ctx.lineWidth=t*7; ctx.shadowBlur=10; ctx.shadowColor=`hsla(${b.hue},100%,60%,0.8)`;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.restore();
      }
    }
  } else { for (const k in trails) delete trails[k]; }

  // Need multiHandLandmarks from old API
  const rawHands = lastResults && lastResults.multiHandLandmarks;
  if (!rawHands || rawHands.length === 0) {
    if (activeFx === 'trails') for (const k in trails) delete trails[k];
    if (activeFx === 'orbs') for (const k in orbs) delete orbs[k];
    return;
  }

  const allPts = rawHands.map(lms => lms.map(lm2s));
  const handStates = rawHands.map((lms, hi) => buildHandState(lms, allPts[hi], hi));
  updateVelocity(allPts);
  if (handStates.every(state => state.fingerCount === 0)) {
    if (activeFx === 'trails') for (const k in trails) delete trails[k];
    if (activeFx === 'orbs') for (const k in orbs) delete orbs[k];
    return;
  }

  handStates.forEach(state => {
    const { hi, pts, fingerCount } = state;
    if (fingerCount === 0) return;
    const hue=HAND_HUE[hi%2], palm=pts[0];
    const pg=ctx.createRadialGradient(palm.x,palm.y,0,palm.x,palm.y,75);
    pg.addColorStop(0,`hsla(${hue},100%,70%,0.15)`);
    pg.addColorStop(1,`hsla(${hue},100%,50%,0)`);
    ctx.save(); ctx.fillStyle=pg; ctx.beginPath();
    ctx.arc(palm.x,palm.y,75,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  if (activeFx==='web')       drawWeb(handStates);
  if (activeFx==='warp')      drawWarp(handStates);
  if (activeFx==='lightning') drawLightningFx(handStates);
  if (activeFx==='particles') drawParticlesFx(handStates);
  if (activeFx==='trails')    drawTrailsFx(handStates);
  if (activeFx==='rigging')   drawRigging(handStates);
  if (activeFx==='fireworks') drawFireworksFx(handStates);
  if (activeFx==='orbs')      drawOrbsFx(handStates);
}

// ── Dynamic script loader with error handling ────────────────────────────────
function loadScript(url, label) {
  return new Promise((resolve, reject) => {
    statusEl.textContent = `Loading ${label}…`;
    console.log(`[MagicHands] Loading ${label}: ${url}`);
    const s = document.createElement('script');
    s.src = url;
    s.crossOrigin = 'anonymous';
    s.onload  = () => { console.log(`[MagicHands] ✅ ${label} loaded`); resolve(); };
    s.onerror = () => reject(new Error(`Failed to load ${label} from ${url}`));
    document.head.appendChild(s);
  });
}

async function init() {
  try {
    // Step 1: Load MediaPipe Hands
    const HANDS_VER = '0.4.1675469240';
    await loadScript(`https://cdn.jsdelivr.net/npm/@mediapipe/hands@${HANDS_VER}/hands.js`, 'hands model');

    // Step 2: Verify globals exist
    if (typeof Hands === 'undefined') throw new Error('Hands class not found — script loaded but empty');

    // Step 3: Create hand tracker
    statusEl.textContent = 'Initializing hand tracker…';
    console.log('[MagicHands] Creating Hands instance…');
    const hands = new Hands({
      locateFile: file => {
        const url = `https://cdn.jsdelivr.net/npm/@mediapipe/hands@${HANDS_VER}/${file}`;
        console.log(`[MagicHands] locateFile: ${file} → ${url}`);
        return url;
      }
    });
    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    hands.onResults(results => {
      lastResults = results;
      const rawHands = results.multiHandLandmarks || [];
      if (rawHands.length === 0) {
        statusEl.textContent = 'Show your hands';
        return;
      }
      const handStates = rawHands.map((lms, hi) => buildHandState(lms, lms, hi));
      const counts = handStates.map((state, hi) =>
        state.fingerCount === 0
          ? `Hand ${hi + 1}: fist`
          : `Hand ${hi + 1}: ${state.fingerCount} finger${state.fingerCount > 1 ? 's' : ''}`
      );
      statusEl.textContent = counts.join(' | ');
    });

    // Step 4: Warm up the model with a blank canvas (forces WASM/model download)
    statusEl.textContent = 'Downloading model files…';
    console.log('[MagicHands] Warming up model with blank frame…');
    const tmp = document.createElement('canvas');
    tmp.width = 320; tmp.height = 240;
    tmp.getContext('2d').fillRect(0, 0, 320, 240);
    await hands.send({ image: tmp });
    console.log('[MagicHands] ✅ Model warm-up complete');

    // Step 5: Start camera
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('getUserMedia is not supported in this browser');
    }
    statusEl.textContent = 'Allow camera access…';
    console.log('[MagicHands] Requesting camera…');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    statusEl.textContent = 'Starting camera…';
    video.srcObject = stream;
    video.setAttribute('playsinline', '');
    await video.play();
    console.log(`[MagicHands] ✅ Camera started: ${video.videoWidth}x${video.videoHeight}`);
    statusEl.textContent = 'Show your hands';

    // Step 6: Detection loop (manual rAF, no Camera utility dependency)
    let busy = false;
    async function detect() {
      if (video.readyState >= 2 && !busy) {
        busy = true;
        try { await hands.send({ image: video }); } catch(e) { console.warn('detect:', e); }
        busy = false;
      }
      requestAnimationFrame(detect);
    }
    detect();

  } catch (err) {
    statusEl.textContent = `❌ ${err.message}`;
    statusEl.style.color = '#ff6666';
    console.error('[MagicHands] Init failed:', err);
  }
}

render();
init();
</script>
